- actions:
  - action: light.turn_on
    target:
      entity_id: light.bedroom_lamps
  - choose:
    - conditions:
      - condition: time
        weekday:
        - sun
        - mon
        - tue
        - wed
        - thu
      - before: '20:00:00'
        condition: time
      sequence:
      - wait_for_trigger:
        - entity_id: binary_sensor.bedroom_motion_sensor
          for:
            minutes: 4
          from: 'on'
          to: 'off'
          trigger: state
      - action: light.turn_off
        target:
          entity_id: light.bedroom_lamps
    - conditions:
      - condition: time
        weekday:
        - sun
        - mon
        - tue
        - wed
        - thu
      - after: '20:00:00'
        before: '21:00:00'
        condition: time
      sequence:
      - wait_for_trigger:
        - entity_id: binary_sensor.bedroom_motion_sensor
          for:
            seconds: 30
          from: 'on'
          to: 'off'
          trigger: state
      - action: light.turn_off
        target:
          entity_id: light.bedroom_lamps
    - conditions:
      - condition: time
        weekday:
        - fri
        - sat
      - before: '23:00:00'
        condition: time
      sequence:
      - wait_for_trigger:
        - entity_id: binary_sensor.bedroom_motion_sensor
          for:
            minutes: 4
          from: 'on'
          to: 'off'
          trigger: state
      - action: light.turn_off
        target:
          entity_id: light.bedroom_lamps
    default:
    - wait_for_trigger:
      - entity_id: binary_sensor.bedroom_motion_sensor
        for:
          minutes: 2
        from: 'on'
        to: 'off'
        trigger: state
    - action: light.turn_off
      target:
        entity_id: light.bedroom_lamps
  alias: Bedroom Light Sensor
  conditions:
  - condition: template
    value_template: '{{ not force_skip }}'
  - condition: or
    conditions:
    - condition: and
      conditions:
      - condition: time
        weekday:
        - sun
        - mon
        - tue
        - wed
        - thu
      - after: 06:30:00
        before: '21:00:00'
        condition: time
    - condition: and
      conditions:
      - condition: time
        weekday:
        - fri
        - sat
      - after: 09:00:00
        before: '23:00:00'
        condition: time
  description: Time-aware motion lighting for bedroom lamps
  id: '1750461684124'
  max_exceeded: silent
  mode: restart
  triggers:
  - entity_id: binary_sensor.bedroom_motion_sensor
    from: 'off'
    to: 'on'
    trigger: state
  variables:
    force_skip: "{{ skip_light_on and\n    (expand(\n      (([] if target_lights.device_id is undefined\n        else target_lights.device_id | device_entities\n        if target_lights.device_id is string\n        else target_lights.device_id | map('device_entities') | sum(start=[]))\n      +\n      ([] if target_lights.entity_id is undefined\n        else [target_lights.entity_id]\n        if target_lights.entity_id is string\n        else target_lights.entity_id))\n    )\n    | select('search', '^light\\.')\n    | selectattr('state', 'eq', 'on')\n    | list\n    | length > 0)\n}}\n"
    skip_light_on: true
    target_lights:
      entity_id: light.bedroom_lamps

