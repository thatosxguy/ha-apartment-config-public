- id: ups_power_outage_response_living_room
  alias: UPS - Power Outage Response
  description: Notify and reduce nonessential loads when the living room UPS switches to battery.
  mode: single
  triggers:
  - entity_id:
    - sensor.living_room_ups_status
    - sensor.living_room_ups_status_data
    trigger: state
  conditions:
  - condition: template
    value_template: "{{\n  'OB' in states('sensor.living_room_ups_status_data')\n  or 'on battery' in states('sensor.living_room_ups_status') | lower\n}}\n"
  actions:
  - target:
      entity_id:
      - switch.living_room_wax_warmer
      - switch.kitchen_wax_warmer
    action: switch.turn_off
  - target:
      entity_id:
      - light.breakfast_nook_light
      - light.living_room_lamp_1
      - light.living_room_lamp_2
    data:
      transition: 1
    action: light.turn_off
  - data:
      title: Power Outage Detected
      message: "Living Room UPS appears to be on battery power. Runtime remaining: {{ states('sensor.ups2_battery_runtime') }}. Nonessential loads were reduced."
    action: persistent_notification.create

