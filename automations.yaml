- id: living_room_welcome_and_motion_smart
  alias: Living Room - Welcome and Motion Smart
  description: Keep living room and hallway lighting simple and reliable. Doors turn on hallway and living room lights, motion turns on living room lights, and no automatic off is used so manual control is respected.
  mode: restart
  triggers:
    - trigger: state
      entity_id: binary_sensor.front_door
      from: "off"
      to: "on"
    - trigger: state
      entity_id: binary_sensor.side_door
      from: "off"
      to: "on"
    - trigger: state
      entity_id: binary_sensor.living_room_motion_sensor
      from: "off"
      to: "on"
  variables:
    is_door_trigger: "{{ trigger.entity_id in ['binary_sensor.front_door', 'binary_sensor.side_door'] }}"
    is_motion_trigger: "{{ trigger.entity_id == 'binary_sensor.living_room_motion_sensor' }}"
    is_late_night: "{{ now().hour >= 23 or now().hour < 6 }}"
  actions:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ is_motion_trigger and is_state('input_boolean.bedtime_mode', 'on') }}"
          sequence:
            - stop: Motion lighting is blocked during bedtime mode.

        - conditions:
            - condition: template
              value_template: "{{ is_door_trigger and is_late_night }}"
          sequence:
            - action: light.turn_on
              target:
                entity_id: light.hallway_light
              data:
                transition: 1
                brightness_pct: 25
            - action: light.turn_on
              target:
                entity_id:
                  - light.breakfast_nook_light
                  - light.living_room_lamp_1
                  - light.living_room_lamp_2
                  - light.living_room_lamp_3
                  - light.living_room_lamp_4
              data:
                transition: 1
                brightness_pct: 30

        - conditions:
            - condition: template
              value_template: "{{ is_door_trigger }}"
          sequence:
            - action: light.turn_on
              target:
                entity_id: light.hallway_light
              data:
                transition: 1
            - action: light.turn_on
              target:
                entity_id:
                  - light.breakfast_nook_light
                  - light.living_room_lamp_1
                  - light.living_room_lamp_2
                  - light.living_room_lamp_3
                  - light.living_room_lamp_4
              data:
                transition: 1

        - conditions:
            - condition: template
              value_template: "{{ is_motion_trigger and is_late_night }}"
          sequence:
            - action: light.turn_on
              target:
                entity_id:
                  - light.breakfast_nook_light
                  - light.living_room_lamp_1
                  - light.living_room_lamp_2
                  - light.living_room_lamp_3
                  - light.living_room_lamp_4
              data:
                transition: 1
                brightness_pct: 30
      default:
        - action: light.turn_on
          target:
            entity_id:
              - light.breakfast_nook_light
              - light.living_room_lamp_1
              - light.living_room_lamp_2
              - light.living_room_lamp_3
              - light.living_room_lamp_4
          data:
            transition: 1

