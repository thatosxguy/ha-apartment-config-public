- actions:
  - action: light.turn_on
    data:
      transition: 0.5
    target:
      entity_id: '{{ target_lights }}'
  - continue_on_timeout: true
    timeout: 00:00:03
    wait_for_trigger:
    - entity_id: binary_sensor.hallway_sensors
      for:
        seconds: 3
      to: 'off'
      trigger: state
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ wait.trigger is not none }}'
      sequence:
      - action: light.turn_off
        data:
          transition: 0.5
        target:
          entity_id: '{{ target_lights }}'
    default:
    - wait_for_trigger:
      - entity_id: binary_sensor.hallway_sensors
        to: 'off'
        trigger: state
    - delay: "{% set base = 30 %}  {# base seconds #} {% if use_weather %}\n  {% set weather = states('weather.forecast_home') | lower %}\n  {% set rainy_states = ['rainy', 'pouring', 'lightning-rainy', 'lightning'] %}\n  {% set extra = rain_extra_seconds if weather in rainy_states else 0 %}\n{% else %}\n  {% set extra = 0 %}\n{% endif %} 00:00:{{ '%02d' % (base + extra) }}\n"
    - action: light.turn_off
      data:
        transition: 0.5
      target:
        entity_id: '{{ target_lights }}'
  alias: Hallway Light Sensor - Smart
  conditions:
  - condition: template
    value_template: '{{ not force_skip }}'
  description: Motion-based hallway light with quick-pass guard and optional rain-aware off delay
  id: '1756582524360'
  max_exceeded: silent
  mode: restart
  triggers:
  - entity_id: binary_sensor.hallway_sensors
    from: 'off'
    to: 'on'
    trigger: state
  variables:
    force_skip: "{{ skip_light_on and\n    (expand(target_lights)\n     | selectattr('state', 'eq', 'on')\n     | list\n     | length > 0)\n}}\n"
    rain_extra_seconds: 30
    skip_light_on: true
    target_lights:
    - light.hallway_light
    use_weather: true

