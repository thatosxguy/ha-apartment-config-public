- id: network_guarded_recovery
  alias: Network - Guarded Recovery
  description: If WAN appears down for a sustained period while Primary user is home, notify first, then reboot the modem plug during sane hours if still down.
  mode: single
  triggers:
  - entity_id: binary_sensor.tp_link_deco_router_wan_status
    to: 'off'
    for: 00:05:00
    trigger: state
  - value_template: "{{\n  states('sensor.cable_modem_ping_latency') in ['unknown', 'unavailable']\n  or states('sensor.cable_modem_status') | lower not in ['online', 'up', 'connected']\n}}\n"
    for: 00:05:00
    trigger: template
  conditions:
  - condition: state
    entity_id: person.primary_user
    state: home
  - condition: time
    after: 06:00:00
    before: '23:00:00'
  actions:
  - data:
      title: Network Recovery Watch
      message: WAN or modem connectivity appears down. Waiting 10 minutes before rebooting the modem plug.
    action: persistent_notification.create
  - delay: 00:10:00
  - condition: or
    conditions:
    - condition: state
      entity_id: binary_sensor.tp_link_deco_router_wan_status
      state: 'off'
    - condition: template
      value_template: "{{\n  states('sensor.cable_modem_ping_latency') in ['unknown', 'unavailable']\n  or states('sensor.cable_modem_status') | lower not in ['online', 'up', 'connected']\n}}\n"
  - target:
      entity_id: switch.modem_plug
    action: switch.turn_off
  - delay: 00:00:20
  - target:
      entity_id: switch.modem_plug
    action: switch.turn_on
  - data:
      title: Network Recovery Action Taken
      message: The modem plug was power-cycled after sustained WAN/modem failure.
    action: persistent_notification.create

- id: network_recovery_restored_notification
  alias: Network - Recovery Restored Notification
  description: Notify when WAN comes back.
  mode: restart
  triggers:
  - entity_id: binary_sensor.tp_link_deco_router_wan_status
    to: 'on'
    for: 00:02:00
    trigger: state
  actions:
  - data:
      title: Network Restored
      message: WAN connectivity appears to be back up.
    action: persistent_notification.create
