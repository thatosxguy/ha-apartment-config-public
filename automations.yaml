      datetime: '{{ cur_time if cur_time else now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
    target:
      entity_id: input_datetime.meter_time_previous
  - action: input_number.set_value
    data:
      value: '{{ new_kwh }}'
    target:
      entity_id: input_number.meter_kwh_current
  - action: input_datetime.set_datetime
    data:
      datetime: '{{ new_time if new_time else now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
    target:
      entity_id: input_datetime.meter_time_current
