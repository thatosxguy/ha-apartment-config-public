- alias: Kitchen Light Sensor
  description: ''
  id: '1750461090461'
  use_blueprint:
    input:
      light_target:
        area_id: kitchen
      motion_entity:
      - binary_sensor.kitchen_motion_sensor
      - binary_sensor.kitchen_motion_sensor_2
