- id: house_bedtime_shutdown
  alias: House - Bedtime Shutdown
  description: Shut down common lights and risky devices when bedtime mode is enabled.
  mode: single
  triggers:
  - entity_id: input_boolean.bedtime_mode
    to: 'on'
    trigger: state
  actions:
  - target:
      entity_id:
      - light.living_room_all
      - light.kitchen_light
      - light.office_lights
      - light.hallway_light
      - light.laundry_room_lights
    data:
      transition: 2
    action: light.turn_off
  - target:
      entity_id:
      - switch.living_room_wax_warmer
      - switch.kitchen_wax_warmer
    action: switch.turn_off
  - target:
      entity_id:
      - switch.matt_s_echo_show_do_not_disturb_switch
      - switch.matt_s_echo_plus_do_not_disturb_switch
      - switch.echoes_do_not_disturb_switch
    action: switch.turn_on
  - data:
      title: Bedtime Mode Enabled
      message: Bedtime shutdown ran successfully. Common lights were turned off, wax warmers were shut down, and Echo DND was enabled.
    action: persistent_notification.create

