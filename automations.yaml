- id: safety_wax_warmers_off_when_unsafe
  alias: Safety - Wax Warmers Off When Unsafe
  description: Turn off wax warmers if overheating, overloaded, bedtime mode is on, or Primary user is away.
  mode: single
  triggers:
  - entity_id:
    - binary_sensor.living_room_wax_warmer_overheated
    - binary_sensor.living_room_wax_warmer_overloaded
    - binary_sensor.kitchen_wax_warmer_overheated
    - binary_sensor.kitchen_wax_warmer_overloaded
    to: 'on'
    trigger: state
  - entity_id: input_boolean.bedtime_mode
    to: 'on'
    trigger: state
  - entity_id: person.primary_user
    to: not_home
    for: 00:15:00
    trigger: state
  actions:
  - target:
      entity_id:
      - switch.living_room_wax_warmer
      - switch.kitchen_wax_warmer
    action: switch.turn_off
  - data:
      title: Wax Warmers Turned Off
      message: "Wax warmers were turned off due to a safety or occupancy rule. Living room overheated: {{ states('binary_sensor.living_room_wax_warmer_overheated') }} Living room overloaded: {{ states('binary_sensor.living_room_wax_warmer_overloaded') }} Kitchen overheated: {{ states('binary_sensor.kitchen_wax_warmer_overheated') }} Kitchen overloaded: {{ states('binary_sensor.kitchen_wax_warmer_overloaded') }} Bedtime mode: {{ states('input_boolean.bedtime_mode') }} Person state: {{ states('person.primary_user') }}"
    action: persistent_notification.create

